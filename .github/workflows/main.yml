name: Build Android APK

on:
  workflow_dispatch: # Позволяет запускать сборку вручную по кнопке

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Скачивание кода
        uses: actions/checkout@v3

      - name: Установка Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Установка Java (нужна для Android)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Установка Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Установка библиотек Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Сборка APK через Flet
        run: flet build apk

      - name: Сохранение готового APK
        uses: actions/upload-artifact@v3
        with:
          name: TestConverter-APK
          path: build/apk/app-release.apk
